harness-engineering: >-
  Designing the environments, processes, and feedback loops that enable
  AI coding agents to do reliable autonomous work — repository structure,
  context architecture, review workflows, and agent tooling.

llm-context-management: >-
  Controlling what information is made available to large language models
  at invocation time — rules files, system prompts, repository knowledge,
  and the architecture of what enters (and stays out of) the context window.
