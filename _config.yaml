# Site Configuration
title: "🐶 Dog with a Dev Blog"
description: "On the internet, nobody knows you're a dog and a cat in a latent space."
url: "https://blog.cani.ne.jp"
baseurl: ""
favicon: "favicon.ico"

# Theme
remote_theme: riggraz/no-style-please
theme_config:
  appearance: "light"
  back_home_text: "~"
  back_link_text: ".."
  date_format: "%Y-%m-%d"
  show_description: true
  lowercase_titles: false

sass:
  style: compressed

markdown: kramdown
highlighter: rouge

# Permalinks w/out categories
permalink: /:year/:month/:day/:title:output_ext

# Collections
collections:
  pages:
    output: true
    permalink: /:path/
  garden:
    output: true
    permalink: /garden/:path:output_ext

# Build settings
exclude:
  - Gemfile
  - Gemfile.lock
  - .git
  - .gitignore
  - README.md
  - "*.skbd"
  - nginx-proxy

# Plugins
plugins:
  - jekyll-archives
  - jekyll-auto-authors
  - jekyll-auto-thumbnails
  - jekyll-feed
  - jekyll-highlight-cards
  - jekyll-loading-lazy
  - jekyll-paginate-v2
  - jekyll-redirect-from
  - jekyll-remote-theme
  - jekyll-seo-tag
  - jekyll-sitemap

# jekyll-archives
jekyll-archives:
  enabled:
    - tags
    - categories
  layouts:
    tag: tag-archive
    category: cat-archive
  permalinks:
    tag: '/tags/:name/'
    category: '/categories/:name/'
  collections:
    garden:
      enabled:
        - tags
      layouts:
        tag: garden-tag-archive
      permalinks:
        tag: '/garden/tags/:name/'

# jekyll-auto-authors
autopages:
  enabled: true
  tags:
    enabled: false
  categories:
    enabled: true
    layouts:
      - 'cat-archive.html'
  collections:
    enabled: false
  authors:
    enabled: true
    data: '_data/authors.yaml'
    layouts:
      - 'author-archive.html'
    title: ':author'
    permalink: '/authors/:author/'
    slugify:
      mode: 'default'
      cased: false

# jekyll-compress-html
compress_html:
  ignore:
    envs:
      - development

# jekyll-auto-thumbnails
auto_thumbnails:
  enabled: true
  max_width: 640
  quality: 95

# jekyll-mermaid-prebuild
mermaid_prebuild:
  postprocessing:
    edge_label_padding: 6
    emoji_width_compensation:
      flowchart: true

# image-paths (local)
image_paths:
  base_url: /assets/img

# heading anchor links (local): icon shown on hover next to headings; build-time only, no JS
heading_anchor:
  icon: "#"
  exclude_index: true

# href-decorator (local): rules-based; match/collections narrow from "all", attrs merge, false disables default
href_decorator:
  defaults:
    target: _blank
    rel: noopener
  rules:
    - match: '^https?://'
    - match: '/assets/'
    - match: '.+\.pdf$'
      attrs:
        download: true
    - match: '^(?!#)'
      collections: [posts]

# jekyll-paginate-v2 (required for jekyll-auto-authors)
pagination:
  enabled: false
